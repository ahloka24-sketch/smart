<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Homework AI</title>

  <style>

    body {

      font-family: Arial, sans-serif;

      background: #f5f7fb;

      margin: 0;

      padding: 20px;

      text-align: center;

    }

    .box {

      max-width: 500px;

      margin: auto;

      background: #fff;

      padding: 20px;

      border-radius: 20px;

      box-shadow: 0 10px 30px rgba(0,0,0,.1);

    }

    h1 { color: #222; }

    input, button {

      width: 100%;

      margin-top: 12px;

      padding: 14px;

      border-radius: 12px;

      border: 1px solid #ddd;

      font-size: 16px;

    }

    button {

      background: #111;

      color: white;

      border: none;

      cursor: pointer;

    }

    img {

      width: 100%;

      margin-top: 15px;

      border-radius: 12px;

      display: none;

    }

    #result {

      margin-top: 20px;

      text-align: left;

      background: #f9f9f9;

      padding: 15px;

      border-radius: 12px;

      white-space: pre-wrap;

    }

  </style>

</head>

<body>

  <div class="box">

    <h1>Homework AI</h1>

    <p>Upload homework image and get the answer instantly</p>

    <input type="file" id="imageInput" accept="image/*" />

    <img id="preview" />

    <button onclick="solveHomework()">Solve Homework</button>

    <div id="result"></div>

  </div>

  <script>

    async function solveHomework() {

      const file = document.getElementById("imageInput").files[0];

      const result = document.getElementById("result");

      const preview = document.getElementById("preview");

      if (!file) {

        result.innerText = "Please upload an image first.";

        return;

      }

      const reader = new FileReader();

      reader.onload = async function () {

        const base64 = reader.result.split(",")[1];

        preview.src = reader.result;

        preview.style.display = "block";

        result.innerText = "Solving...";

        try {

          const res = await fetch("https://smart-bg8j.onrender.com/", {

            method: "POST",

            headers: { "Content-Type": "application/json" },

            body: JSON.stringify({ image: base64 })

          });

          const data = await res.json();

          result.innerText = data.answer || "No answer returned.";

        } catch (err) {

          result.innerText = "Error: " + err.message;

        }

      };

      reader.readAsDataURL(file);

    }

  </script>

</body>

</html>
