<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Smart Teacher AI</title>

  <style>

    body {

      font-family: Arial, sans-serif;

      background: linear-gradient(135deg, #eef2f7, #ffffff);

      margin: 0;

      padding: 20px;

      text-align: center;

    }

    .box {

      max-width: 520px;

      margin: auto;

      background: white;

      padding: 25px;

      border-radius: 20px;

      box-shadow: 0 10px 30px rgba(0,0,0,.1);

    }

    h1 {

      color: #1e1e1e;

    }

    p {

      color: #666;

    }

    input, textarea, button {

      width: 100%;

      margin-top: 12px;

      padding: 14px;

      border-radius: 12px;

      border: 1px solid #ddd;

      font-size: 16px;

      box-sizing: border-box;

    }

    textarea {

      resize: none;

      height: 90px;

    }

    button {

      background: #111;

      color: white;

      border: none;

      cursor: pointer;

      font-weight: bold;

    }

    button:hover {

      background: #333;

    }

    img {

      width: 100%;

      margin-top: 15px;

      border-radius: 12px;

      display: none;

    }

    #result {

      margin-top: 20px;

      text-align: left;

      background: #f7f7f7;

      padding: 15px;

      border-radius: 12px;

      white-space: pre-wrap;

      min-height: 50px;

    }

  </style>

</head>

<body>

<div class="box">

  <h1>🧠 Smart Teacher AI</h1>

  <p>Upload or take a photo + write your question</p>

  <input type="file" id="imageInput" accept="image/*" />

  <textarea id="question" placeholder="Write what you want the AI to solve..."></textarea>

  <img id="preview" />

  <button onclick="solveHomework()">Solve Now 🚀</button>

  <div id="result"></div>

</div>

<script>

async function solveHomework() {

  const file = document.getElementById("imageInput").files[0];

  const question = document.getElementById("question").value;

  const result = document.getElementById("result");

  const preview = document.getElementById("preview");

  if (!file) {

    result.innerText = "❌ Please upload an image first.";

    return;

  }

  const reader = new FileReader();

  reader.onload = async function () {

    const base64 = reader.result.split(",")[1];

    preview.src = reader.result;

    preview.style.display = "block";

    result.innerText = "⏳ Solving like a smart teacher...";

    try {

      const res = await fetch("https://smart-bg8j.onrender.com/solveHomework", {

        method: "POST",

        headers: {

          "Content-Type": "application/json"

        },

        body: JSON.stringify({

          image: base64,

          question: question

        })

      });

      const data = await res.json();

      result.innerText = data.answer || "No answer returned.";

    } catch (err) {

      result.innerText = "Error: " + err.message;

    }

  };

  reader.readAsDataURL(file);

}

</script>

</body>

</html>
