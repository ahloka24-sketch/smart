<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Smart Teacher Chat AI</title>

<style>

body {

  font-family: Arial;

  background: #f4f6fb;

  margin: 0;

  padding: 20px;

  text-align: center;

}

.box {

  max-width: 600px;

  margin: auto;

  background: white;

  padding: 20px;

  border-radius: 15px;

  box-shadow: 0 10px 25px rgba(0,0,0,0.1);

}

#chat {

  height: 400px;

  overflow-y: auto;

  border: 1px solid #eee;

  padding: 10px;

  border-radius: 10px;

  text-align: left;

  background: #fafafa;

}

.msg {

  margin: 10px 0;

}

.user {

  color: blue;

  font-weight: bold;

}

.ai {

  color: green;

  font-weight: bold;

}

input {

  width: 100%;

  padding: 12px;

  margin-top: 10px;

  border-radius: 10px;

  border: 1px solid #ddd;

}

button {

  width: 100%;

  padding: 12px;

  margin-top: 10px;

  background: black;

  color: white;

  border: none;

  border-radius: 10px;

  cursor: pointer;

}

</style>

</head>

<body>

<div class="box">

  <h2>🧠 Smart Teacher Chat AI</h2>

  <div id="chat"></div>

  <input id="input" placeholder="Ask anything..." />

  <button onclick="send()">Send</button>

</div>

<script>

const chat = document.getElementById("chat");

function addMsg(text, type) {

  const div = document.createElement("div");

  div.className = "msg " + type;

  div.innerText = (type === "user" ? "You: " : "AI: ") + text;

  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;

}

async function send() {

  const input = document.getElementById("input");

  const text = input.value;

  if (!text) return;

  addMsg(text, "user");

  input.value = "";

  addMsg("Thinking...", "ai");

  try {

    const res = await fetch("https://smart-bg8j.onrender.com/", {

      method: "POST",

      headers: {

        "Content-Type": "application/json"

      },

      body: JSON.stringify({ message: text })

    });

    const data = await res.json();

    chat.lastChild.remove();

    addMsg(data.answer || "No answer", "ai");

  } catch (err) {

    chat.lastChild.remove();

    addMsg("Error: " + err.message, "ai");

  }

}

</script>

</body>

</html>
