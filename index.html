<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Smart Teacher AI</title>

  <style>

    body {

      font-family: Arial;

      background: #f4f6fb;

      text-align: center;

      padding: 20px;

    }

    .box {

      max-width: 520px;

      margin: auto;

      background: #fff;

      padding: 20px;

      border-radius: 18px;

      box-shadow: 0 10px 25px rgba(0,0,0,0.1);

    }

    h1 { margin-bottom: 5px; }

    input, textarea, button {

      width: 100%;

      margin-top: 12px;

      padding: 12px;

      border-radius: 10px;

      border: 1px solid #ddd;

      font-size: 16px;

    }

    textarea {

      height: 80px;

      resize: none;

    }

    button {

      background: black;

      color: white;

      cursor: pointer;

      border: none;

    }

    button:hover {

      background: #333;

    }

    img {

      width: 100%;

      margin-top: 10px;

      border-radius: 10px;

      display: none;

    }

    #result {

      margin-top: 15px;

      text-align: left;

      background: #f7f7f7;

      padding: 12px;

      border-radius: 10px;

      min-height: 50px;

      white-space: pre-wrap;

    }

  </style>

</head>

<body>

<div class="box">

  <h1>🧠 Smart Teacher AI</h1>

  <p>Upload image and get answer</p>

  <input type="file" id="file" accept="image/*"/>

  <textarea id="question" placeholder="Write your question (optional)"></textarea>

  <img id="preview"/>

  <button onclick="send()">Solve Homework 🚀</button>

  <div id="result"></div>

</div>

<script>

function toBase64(file) {

  return new Promise((resolve, reject) => {

    const reader = new FileReader();

    reader.onload = () => {

      // ✅ important fix: remove prefix

      const base64 = reader.result.split(",")[1];

      resolve(base64);

    };

    reader.onerror = reject;

    reader.readAsDataURL(file);

  });

}

async function send() {

  const file = document.getElementById("file").files[0];

  const result = document.getElementById("result");

  const preview = document.getElementById("preview");

  const question = document.getElementById("question").value;

  if (!file) {

    result.innerText = "❌ Please upload an image first";

    return;

  }

  result.innerText = "⏳ Thinking like a teacher...";

  try {

    const base64 = await toBase64(file);

    preview.src = URL.createObjectURL(file);

    preview.style.display = "block";

    const res = await fetch("https://smart-bg8j.onrender.com/solveHomework", {

      method: "POST",

      headers: {

        "Content-Type": "application/json"

      },

      body: JSON.stringify({

        image: base64,

        question: question

      })

    });

    if (!res.ok) {

      const errText = await res.text();

      throw new Error(errText);

    }

    const data = await res.json();

    result.innerText = data.answer || "No answer returned.";

  } catch (err) {

    result.innerText = "❌ Error: " + err.message;

  }

}

</script>

</body>

</html>
